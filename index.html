    <script>
        tailwind.config = { darkMode: 'class' }

        // Three.js State (Non-reactive to avoid Proxy issues with Alpine.js)
        const threeState = {
            scene: null,
            camera: null,
            renderer: null,
            controls: null,
            currentMesh: null
        };

        function mainApp() {
            return {
                // UI State
                showAbout: false,
                darkMode: localStorage.getItem('darkMode') === 'true',
                language: localStorage.getItem('language') || 'it',
                user: null,
                searchPrinter: '',
                showPrinterDropdown: false,
                
                // 3D Viewer State
                hasModel: false,
                isDragging: false,
                
                // Cloud State
                quotes: [],
                loadingQuotes: false,
                saving: false,

                // Calculator Data
                spools: [{ costPerKg: 23.00, grams: 170 }],
                printHours: 4,
                printMinutes: 0,
                selectedPrinter: 'Bambu Lab|X1-Carbon',
                printerWattage: 120,
                kwhCost: 0.33,
                maintenanceCost: 10,   // Usura Macchina (%)
                failureRate: 5,        // Tasso di Fallimento (%)
                profitPercent: 30,
                ivaPercent: 22,
                printerBrands: CalcService.printerBrands,
                
                init() {
                    // Controllo se Firebase è caricato (fondamentale per Render/GitHub)
                    if (typeof auth !== 'undefined') {
                        // Controllo Autenticazione
                        AuthService.onAuthStateChanged(user => {
                            if (!user) {
                                window.location.href = 'auth.html';
                            } else {
                                this.user = user;
                                this.fetchQuotes();
                            }
                        });
                    } else {
                        console.warn("Firebase non configurato. L'app funzionerà in modalità locale (senza login).");
                    }

                    this.$watch('language', value => localStorage.setItem('language', value));
                    this.$watch('darkMode', value => {
                        localStorage.setItem('darkMode', value);
                        document.documentElement.classList.toggle('dark', value);
                    });
                },

                // Getters (Utilizzano il CalcService "backend")
                get filteredPrinters() {
                    const search = this.searchPrinter.toLowerCase().trim();
                    const results = [];
                    
                    // Aggiungiamo l'opzione personalizzata in alto se non c'è ricerca o se la ricerca include "custom"
                    if (!search || 'personalizzato'.includes(search) || 'custom'.includes(search)) {
                        results.push({ brand: '--', name: this.t('custom_printer'), watts: 0, id: 'custom' });
                    }

                    for (const [brand, printers] of Object.entries(this.printerBrands)) {
                        printers.forEach(p => {
                            const fullName = `${brand} ${p.name}`.toLowerCase();
                            if (!search || fullName.includes(search)) {
                                results.push({
                                     brand: brand,
                                     name: p.name,
                                     watts: p.watts,
                                     id: `${brand}|${p.name}`
                                 });
                            }
                        });
                    }
                    return results;
                },

                get results() {
                    return CalcService.generateQuote({
                        spools: this.spools,
                        hours: this.printHours,
                        minutes: this.printMinutes,
                        wattage: this.printerWattage,
                        kwhCost: this.kwhCost,
                        maintenanceCost: this.maintenanceCost,
                        failureRate: this.failureRate,
                        ivaPercent: this.ivaPercent,
                        profitPercent: this.profitPercent
                    });
                },

                // Actions
                addSpool() { this.spools.push({ costPerKg: 20.00, grams: 0 }); },
                removeSpool(index) { this.spools.splice(index, 1); },
                
                updatePrinterPower() {
                    if (this.selectedPrinter !== 'custom') {
                        const [brand, name] = this.selectedPrinter.split('|');
                        if (brand && name && this.printerBrands[brand]) {
                            const p = this.printerBrands[brand].find(x => x.name === name);
                            if (p) { this.printerWattage = p.watts; }
                        }
                    }
                    this.showPrinterDropdown = false;
                    this.searchPrinter = '';
                },

                getSelectedPrinterName() {
                    if (this.selectedPrinter === 'custom') return this.t('custom_printer');
                    const [brand, name] = this.selectedPrinter.split('|');
                    return brand && name ? `${brand} ${name}` : this.selectedPrinter;
                },

                formatEuro(value) {
                    const lang = this.language === 'en' ? 'en-US' : 'it-IT';
                    return new Intl.NumberFormat(lang, { 
                        style: 'currency', 
                        currency: 'EUR' 
                    }).format(value || 0);
                },

                // Cloud Logic
                async saveQuote() {
                    if (!this.user) return;
                    this.saving = true;
                    try {
                        const quoteData = {
                            userId: this.user.uid,
                            userEmail: this.user.email,
                            timestamp: Date.now(),
                            printer: this.getSelectedPrinterName(),
                            finalPrice: this.results.finalPrice,
                            details: {
                                materialCost: this.results.materialCost,
                                energyCost: this.results.energyCost,
                                machineCost: this.results.machineCost,
                                failureImpact: this.results.failureImpact,
                                ivaAmount: this.results.ivaAmount,
                                profitAmount: this.results.profitAmount,
                                inputs: {
                                    spools: JSON.parse(JSON.stringify(this.spools)),
                                    hours: this.printHours,
                                    minutes: this.printMinutes,
                                    wattage: this.printerWattage
                                }
                            }
                        };
                        await DbService.saveQuote(quoteData);
                        await this.fetchQuotes();
                        alert(this.language === 'it' ? "Preventivo salvato correttamente!" : "Quote saved successfully!");
                    } catch (err) {
                        console.error("Errore salvataggio:", err);
                        alert("Errore durante il salvataggio.");
                    } finally {
                        this.saving = false;
                    }
                },

                async fetchQuotes() {
                    if (!this.user) return;
                    this.loadingQuotes = true;
                    try {
                        this.quotes = await DbService.getUserQuotes(this.user.uid);
                    } catch (err) {
                        console.error("Errore recupero:", err);
                    } finally {
                        this.loadingQuotes = false;
                    }
                },

                async deleteQuote(id) {
                    if (!confirm(this.t('confirm_delete_quote'))) return;
                    try {
                        await DbService.deleteQuote(id);
                        await this.fetchQuotes();
                    } catch (err) {
                        console.error("Errore eliminazione:", err);
                    }
                },

                formatDate(timestamp) {
                    return new Date(timestamp).toLocaleString(this.language === 'it' ? 'it-IT' : 'en-US', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                },

                // 3D Viewer Logic
                init3D() {
                    console.log("Inizializzazione 3D...");
                    const container = document.getElementById('canvas-3d');
                    if (!container) return;

                    try {
                        threeState.scene = new THREE.Scene();
                        threeState.scene.background = new THREE.Color(this.darkMode ? 0x111827 : 0xf3f4f6);
                        
                        threeState.camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
                        threeState.camera.position.set(50, 50, 50);

                        threeState.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                        threeState.renderer.setSize(container.clientWidth, container.clientHeight);
                        threeState.renderer.setPixelRatio(window.devicePixelRatio);
                        
                        container.innerHTML = '';
                        container.appendChild(threeState.renderer.domElement);

                        // Lights
                        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                        threeState.scene.add(ambientLight);
                        
                        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
                        dirLight.position.set(1, 1, 1).normalize();
                        threeState.scene.add(dirLight);

                        // Controls
                        threeState.controls = new THREE.OrbitControls(threeState.camera, threeState.renderer.domElement);
                        threeState.controls.enableDamping = true;

                        // Animation Loop
                        const animate = () => {
                            requestAnimationFrame(animate);
                            if (threeState.controls) threeState.controls.update();
                            if (threeState.renderer && threeState.scene && threeState.camera) {
                                threeState.renderer.render(threeState.scene, threeState.camera);
                            }
                        };
                        animate();

                        // Resize Observer
                        const resizeObserver = new ResizeObserver(() => {
                            if (container.clientWidth > 0 && threeState.camera && threeState.renderer) {
                                threeState.camera.aspect = container.clientWidth / container.clientHeight;
                                threeState.camera.updateProjectionMatrix();
                                threeState.renderer.setSize(container.clientWidth, container.clientHeight);
                            }
                        });
                        resizeObserver.observe(container);
                        
                        this.$watch('darkMode', value => {
                            if (threeState.scene) threeState.scene.background = new THREE.Color(value ? 0x111827 : 0xf3f4f6);
                        });
                    } catch (err) {
                        console.error("Errore 3D:", err);
                    }
                },

                handleFileSelect(event) {
                    const file = event.target.files[0];
                    if (file) this.loadSTL(file);
                },

                handleDrop(event) {
                    this.isDragging = false;
                    const file = event.dataTransfer.files[0];
                    if (file && file.name.toLowerCase().endsWith('.stl')) this.loadSTL(file);
                },

                loadSTL(file) {
                    if (!threeState.scene) return;
                    
                    // Controllo dimensione file (Max 50MB per stabilità browser)
                    if (file.size > 50 * 1024 * 1024) {
                        alert("Il file è troppo grande (Max 50MB).");
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const loader = new THREE.STLLoader();
                            const geometry = loader.parse(e.target.result);
                            
                            if (threeState.currentMesh) threeState.scene.remove(threeState.currentMesh);

                            const material = new THREE.MeshPhongMaterial({ 
                                color: 0x3b82f6, 
                                specular: 0x444444, 
                                shininess: 100 
                            });
                            threeState.currentMesh = new THREE.Mesh(geometry, material);
                            
                            geometry.computeBoundingBox();
                            const center = new THREE.Vector3();
                            geometry.boundingBox.getCenter(center);
                            geometry.translate(-center.x, -center.y, -center.z);

                            const size = new THREE.Vector3();
                            geometry.boundingBox.getSize(size);
                            const maxDim = Math.max(size.x, size.y, size.z);
                            const scale = 60 / maxDim;
                            threeState.currentMesh.scale.set(scale, scale, scale);

                            threeState.scene.add(threeState.currentMesh);
                            this.hasModel = true;
                            
                            threeState.camera.position.set(50, 50, 50);
                            threeState.camera.lookAt(0, 0, 0);
                            if (threeState.controls) threeState.controls.reset();
                        } catch (err) {
                            console.error("Errore STL:", err);
                            alert("File STL non valido o troppo grande.");
                        }
                    };
                    reader.readAsArrayBuffer(file);
                },

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen transition-colors duration-200" x-cloak>

                <button x-show="user" @click="AuthService.logout()" class="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-full transition" :title="t('logout')">

                    <svg x-show="darkMode" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </button>

        <!-- Calculator View -->

            <!-- Colonna 1: Impostazioni e Input -->

                <!-- Material Section -->

                                <svg class="w-5 h-5 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>

                                                <span class="absolute right-3 top-2 text-gray-400 text-xs">g</span>
                                            </div>
                                        </div>
                                    </div>

                        </div>
                        <button @click="addSpool()" class="w-full py-3 mt-2 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-xl border-2 border-dashed border-blue-100 dark:border-blue-800 hover:bg-blue-100 dark:hover:bg-blue-900/40 transition-all flex items-center justify-center gap-2 font-bold text-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                            <span x-text="t('add_spool')"></span>

                    </section>

                    <!-- Time Section -->
                    <section class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700">
                        <h3 class="text-lg font-bold mb-4 dark:text-white flex items-center gap-2">
                            <div class="p-2 bg-orange-100 dark:bg-orange-900 rounded-lg">
                                <svg class="w-5 h-5 text-orange-600 dark:text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <span x-text="t('time_section')"></span>
                        </h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] uppercase tracking-wider font-bold text-gray-400 mb-1" x-text="t('hours')"></label>
                                <input type="number" x-model.number="printHours" min="0" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 rounded-xl text-lg font-black focus:ring-2 focus:ring-orange-500 outline-none">
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase tracking-wider font-bold text-gray-400 mb-1" x-text="t('minutes')"></label>
                                <input type="number" x-model.number="printMinutes" min="0" max="59" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 rounded-xl text-lg font-black focus:ring-2 focus:ring-orange-500 outline-none">
                            </div>
                </section>

                <!-- Economic Settings -->
                <section class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-sm border border-gray-100 dark:border-gray-700">
                    <h3 class="text-lg font-bold mb-6 dark:text-white flex items-center gap-2">
                        <div class="p-2 bg-emerald-100 dark:bg-emerald-900 rounded-lg">
                            <svg class="w-5 h-5 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        </div>
                        <span x-text="t('economic_section')"></span>
                    </h3>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2" x-text="t('printer_model')"></label>
                            <div class="relative" @click.away="showPrinterDropdown = false">
                                <button @click="showPrinterDropdown = !showPrinterDropdown" 
                                        class="w-full flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 rounded-xl outline-none focus:ring-2 focus:ring-emerald-500 transition-all text-sm font-bold">
                                    <span x-text="getSelectedPrinterName()"></span>

                        <div class="grid grid-cols-2 gap-4">

                                    <input type="number" x-model.number="printerWattage" :disabled="selectedPrinter !== 'custom'" :class="selectedPrinter !== 'custom' ? 'opacity-50' : ''" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 outline-none font-bold">

                                </div>
                            </div>

                        <div class="grid grid-cols-2 gap-4 pt-4 border-t border-gray-100 dark:border-gray-700">

                                <label class="block text-[10px] uppercase tracking-wider font-bold text-gray-400 mb-1" x-text="t('maintenance_cost')"></label>

                                    <span class="absolute right-3 top-2 text-gray-400 text-xs">%</span>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 pt-4 border-t border-gray-100 dark:border-gray-700">
                            <div>
                                <label class="block text-[10px] uppercase tracking-wider font-bold text-gray-400 mb-1" x-text="t('profit_percent')"></label>
                                <div class="relative">
                                    <input type="number" x-model.number="profitPercent" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 outline-none font-bold">
                                    <span class="absolute right-3 top-2 text-gray-400 text-xs">%</span>
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] uppercase tracking-wider font-bold text-gray-400 mb-1" x-text="t('iva_percent')"></label>

                                    <span class="absolute right-3 top-2 text-gray-400 text-xs">%</span>

                         @dragleave.prevent="isDragging = false"
                         @drop.prevent="handleDrop($event)">

                        <div id="canvas-3d" class="absolute inset-0 z-0" x-show="hasModel"></div>

                            <p class="text-sm text-gray-400 font-medium" x-text="t('drop_stl')"></p>
                        </div>
                    </div>
                </section>

                    <div class="flex items-center justify-between mb-6">

                            <div class="p-2 bg-purple-100 dark:bg-purple-900 rounded-lg">
                                <svg class="w-5 h-5 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                            <span x-text="t('history')"></span>
                        </h3>

                        </button>
                    </div>

                    <div class="space-y-4 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">

                                <p class="text-sm text-gray-400">Nessun preventivo salvato</p>
                            </div>
                        </template>

                        <template x-for="quote in quotes" :key="quote.id">
                            <div class="group bg-gray-50 dark:bg-gray-700/30 p-4 rounded-2xl border border-gray-100 dark:border-gray-700 hover:border-purple-200 dark:hover:border-purple-900 transition-all">
                                <div class="flex justify-between items-start mb-2">
                                    <div>
                                        <h4 class="text-xs font-black text-purple-600 dark:text-purple-400 uppercase tracking-tighter" x-text="quote.printer"></h4>
                                        <p class="text-[10px] text-gray-400" x-text="formatDate(quote.timestamp)"></p>
                                    </div>
                                    <button @click="deleteQuote(quote.id)" class="text-gray-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                    </button>
                                </div>
                                <div class="flex justify-between items-end">
                                    <div class="text-xs text-gray-500 dark:text-gray-400">
                                        <span x-text="quote.details.inputs.hours"></span>h 
                                        <span x-text="quote.details.inputs.minutes"></span>m • 
                                        <span x-text="quote.details.inputs.spools[0].grams"></span>g
                                    </div>
                                    <div class="text-lg font-black text-gray-900 dark:text-white" x-text="formatEuro(quote.finalPrice)"></div>
                                </div>
                            </div>
                        </template>
                    </div>
                </section>
            </div>

            <!-- Colonna 3: Riepilogo Costi (Sticky) -->
            <div class="lg:sticky lg:top-6 space-y-6">
                <section class="bg-gray-900 p-8 rounded-[2.5rem] text-white shadow-2xl flex flex-col relative overflow-hidden">
                    <!-- Sfondo Decorativo -->
                    <div class="absolute -right-20 -top-20 w-64 h-64 bg-blue-600/20 rounded-full blur-3xl"></div>
                    <div class="absolute -left-20 -bottom-20 w-64 h-64 bg-emerald-600/10 rounded-full blur-3xl"></div>

                    <h2 class="text-xl font-black mb-8 border-b border-white/10 pb-6 flex items-center justify-between" x-text="t('summary_title')">
                        <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    </h2>
                    
                    <div class="flex-grow space-y-5 relative z-10">
                        <div class="flex justify-between items-center group">
                            <span class="text-xs uppercase tracking-widest text-gray-400 group-hover:text-white transition-colors" x-text="t('material_cost')"></span>
                            <span class="text-lg font-bold" x-text="formatEuro(results.materialCost)"></span>
                        </div>
                        <div class="flex justify-between items-center group">
                            <span class="text-xs uppercase tracking-widest text-gray-400 group-hover:text-white transition-colors" x-text="t('energy_cost')"></span>
                            <span class="text-lg font-bold" x-text="formatEuro(results.energyCost)"></span>
                        </div>
                        <div class="flex justify-between items-center group">
                            <span class="text-xs uppercase tracking-widest text-gray-400 group-hover:text-white transition-colors" x-text="t('machine_cost')"></span>
                            <span class="text-lg font-bold" x-text="formatEuro(results.machineCost)"></span>
                        </div>
                        <div x-show="failureRate > 0" class="flex justify-between items-center group text-red-400">
                            <span class="text-xs uppercase tracking-widest opacity-80" x-text="t('failure_impact')"></span>
                            <span class="text-lg font-bold" x-text="'+ ' + formatEuro(results.failureImpact)"></span>
                        </div>
                        
                        <div class="flex justify-between items-center pt-6 border-t border-white/10">
                            <span class="text-xs uppercase tracking-widest font-black text-blue-400" x-text="t('total_without_profit')"></span>
                            <span class="text-2xl font-black" x-text="formatEuro(results.basePrice)"></span>
                        </div>
                        
                        <div class="flex justify-between items-center group">
                            <span class="text-xs uppercase tracking-widest text-gray-400"><span x-text="t('iva')"></span> (<span x-text="ivaPercent"></span>%)</span>
                            <span class="text-lg font-bold text-gray-300" x-text="'+ ' + formatEuro(results.ivaAmount)"></span>
                        </div>
                        
                        <div class="flex justify-between items-center pt-4 border-t border-white/5 group">
                            <span class="text-xs uppercase tracking-widest text-gray-400" x-text="t('price_with_iva')"></span>
                            <span class="text-xl font-bold" x-text="formatEuro(results.priceWithIva)"></span>
                        </div>
                        
                        <div class="flex justify-between items-center group">
                            <span class="text-xs uppercase tracking-widest text-gray-400"><span x-text="t('profit')"></span> (<span x-text="profitPercent"></span>%)</span>
                            <span class="text-lg font-bold text-emerald-400" x-text="'+ ' + formatEuro(results.profitAmount)"></span>
                        </div>
                    </div>

                    <div class="mt-10 bg-gradient-to-br from-blue-600 to-blue-800 p-8 rounded-[2rem] shadow-2xl border border-white/10 transform transition-transform hover:scale-[1.02]">
                        <div class="text-[10px] uppercase tracking-[0.3em] font-black text-blue-200 mb-3" x-text="t('final_price_label')"></div>
                        <div class="text-5xl sm:text-6xl font-black tracking-tighter" x-text="formatEuro(results.finalPrice)"></div>
                    </div>

                    <!-- Cloud Save Button -->
                    <button @click="saveQuote()" 
                            :disabled="saving"
                            class="w-full mt-6 py-4 bg-white/10 hover:bg-white/20 disabled:opacity-50 disabled:cursor-not-allowed border border-white/10 rounded-2xl flex items-center justify-center gap-3 transition-all group">
                        <template x-if="!saving">
                            <div class="flex items-center gap-3">
                                <svg class="w-5 h-5 text-blue-400 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                                <span class="font-bold text-sm uppercase tracking-wider" x-text="t('save')"></span>
                            </div>
                        </template>
                        <template x-if="saving">
                            <div class="flex items-center gap-3">
                                <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                <span class="text-sm font-medium">Saving...</span>
                            </div>
                        </template>
                    </button>

                    <p class="mt-8 text-[9px] text-gray-500 uppercase tracking-widest text-center" x-text="t('footer_note')"></p>
                </section>
            </div>
        </main>
    </div>

    <!-- About Modal -->
    <div x-show="showAbout" x-cloak class="fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div x-show="showAbout" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100" x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0" class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" @click="showAbout = false"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div x-show="showAbout" x-transition:enter="ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100" x-transition:leave="ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100" x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95" class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-2xl px-4 pt-5 pb-4 text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full sm:p-6">
                <div>
                    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 dark:bg-blue-900">
                        <svg class="h-6 w-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <div class="mt-3 text-center sm:mt-5">
                        <h3 class="text-xl leading-6 font-bold text-gray-900 dark:text-white" id="modal-title" x-text="t('about_title')"></h3>
                        <div class="mt-4 text-sm text-gray-500 dark:text-gray-300 space-y-4 text-left">
                            <p class="font-semibold italic text-center text-blue-600 dark:text-blue-400" x-text="t('about_slogan')"></p>
                            <p x-text="t('about_desc_1')"></p>
                            <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-xl border border-gray-200 dark:border-gray-600">
                                <h4 class="font-bold mb-2 text-gray-700 dark:text-gray-200" x-text="t('features_title')"></h4>
                                <ul class="list-disc list-inside space-y-1">
                                    <li x-text="t('feature_1')"></li>
                                    <li x-text="t('feature_2')"></li>
                                    <li x-text="t('feature_3')"></li>
                                    <li x-text="t('feature_4')"></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="mt-8 sm:mt-10">
                    <button type="button" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition" @click="showAbout = false" x-text="t('close')"></button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
